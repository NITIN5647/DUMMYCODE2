<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .p1{
            position:static;
             top:100px;
             background-color: yellow;
             width: 150px;
             
        }

        .d1{
            width:400px;
            height:500px;
            border: 2px solid black;

        }

        .p2{
            position:absolute;
             top:100px;
             background-color:green;
             width: 150px;
             

        }

           
    </style>
</head>
<body>
<p class="p1">Lorem ipsum dolor, sit amet consectetur </p>
<div class="d1"><p class="p2">Lorem ipsum dolor, sit amet consectetur </p></div>

</body>
</html>
