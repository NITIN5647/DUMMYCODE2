<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body{
            margin: 0;
            font-family:Arial;
        }

        .navbar{
            display: flex;
            justify-content: space-between;
            background-color:#333;
            padding:10px 20px;
        }
        .left, .right{
            display: flex;
        }

        .navbar a{
            color: white;
            text-decoration:none;
            padding:10px 15px;
        }

        .navbar a:hover{
            background-color: #555;
        }
    </style>
</head>

</html>
